<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SalesUncut — Mon espace candidat</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-overlay{position:fixed;inset:0;z-index:200;background:var(--ink);display:flex;align-items:center;justify-content:center;padding:24px;}
    .auth-overlay.hidden{display:none;}
    .auth-box{width:100%;max-width:460px;background:var(--cream);border:1.5px solid var(--ink);border-radius:8px;overflow:hidden;}
    .auth-header{background:var(--ink);padding:28px 36px;display:flex;align-items:center;justify-content:space-between;}
    .auth-logo{font-family:var(--font-display);font-weight:900;font-size:18px;color:var(--cream);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:8px;text-decoration:none;}
    .auth-logo .dot{width:8px;height:8px;background:var(--gold);border-radius:50%;}
    .auth-badge{font-family:var(--font-mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);padding:4px 10px;border-radius:20px;}
    .auth-body{padding:36px;}
    .auth-form{display:flex;flex-direction:column;gap:16px;}
    .form-group{display:flex;flex-direction:column;gap:6px;}
    .form-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal-3);}
    .form-input{padding:12px 16px;border:1.5px solid var(--cream-3);border-radius:4px;background:var(--cream);font-family:var(--font-sans);font-size:15px;color:var(--ink);transition:border-color .2s;outline:none;}
    .form-input:focus{border-color:var(--gold-deep);}
    .form-input::placeholder{color:var(--teal-3);}
    .auth-submit{margin-top:8px;padding:15px;background:var(--gold-deep);color:var(--cream);border:none;border-radius:4px;cursor:pointer;font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;transition:background .2s;}
    .auth-submit:hover{background:var(--ink);}
    .auth-submit:disabled{opacity:.5;cursor:not-allowed;}
    .auth-error{padding:12px 16px;background:rgba(179,78,42,.1);border:1px solid var(--rust);border-radius:4px;font-size:13px;color:var(--rust);display:none;}
    .auth-error.visible{display:block;}
    .auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--teal-3);}
    .auth-switch a{color:var(--gold-deep);cursor:pointer;text-decoration:underline;}
    .dashboard{display:none;}
    .dashboard.visible{display:block;}
    .candidate-bar{background:var(--ink);color:var(--cream);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:52px;border-bottom:1px solid rgba(255,248,231,.1);}
    .candidate-bar-left{display:flex;align-items:center;gap:32px;}
    .candidate-bar-logo{font-family:var(--font-display);font-weight:900;font-size:16px;color:var(--cream);text-transform:uppercase;letter-spacing:.05em;text-decoration:none;display:flex;align-items:center;gap:6px;}
    .candidate-bar-logo .dot{width:6px;height:6px;background:var(--gold);border-radius:50%;}
    .bar-tabs{display:flex;}
    .bar-tab{padding:0 20px;height:52px;display:flex;align-items:center;font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;color:rgba(255,248,231,.5);border-bottom:2px solid transparent;transition:all .2s;}
    .bar-tab.active{color:var(--cream);border-bottom-color:var(--gold);}
    .bar-tab:hover{color:var(--cream);}
    .candidate-bar-right{display:flex;align-items:center;gap:16px;}
    .candidate-name-display{font-family:var(--font-mono);font-size:11px;color:rgba(255,248,231,.6);letter-spacing:.08em;}
    .btn-logout{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;border:1px solid rgba(255,248,231,.2);border-radius:3px;background:none;color:rgba(255,248,231,.6);cursor:pointer;transition:all .2s;}
    .btn-logout:hover{border-color:var(--rust);color:var(--rust);}
    .tab-panel{display:none;padding:40px;}
    .tab-panel.active{display:block;}
    .profil-header{display:grid;grid-template-columns:auto 1fr auto;gap:32px;align-items:center;margin-bottom:40px;padding:32px;background:var(--cream-2);border:1.5px solid var(--cream-3);border-radius:8px;}
    .profil-avatar{width:80px;height:80px;border-radius:50%;background:var(--cream-3);border:2.5px solid var(--gold);overflow:hidden;flex-shrink:0;}
    .profil-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
    .profil-avatar-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;opacity:.3;}
    .profil-identity h2{font-family:var(--font-display);font-weight:900;font-size:28px;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:4px;}
    .profil-identity .meta{font-family:var(--font-mono);font-size:11px;color:var(--teal-3);letter-spacing:.08em;}
    .profil-badge-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
    .niveau-badge{display:inline-flex;padding:5px 16px;border-radius:20px;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
    .niveau-badge.GOLD{background:var(--golden);color:var(--ink);}
    .niveau-badge.SILVER{background:var(--silver);color:var(--ink);}
    .niveau-badge.BRONZE{background:var(--bronze);color:var(--cream);}
    .niveau-badge.NC{background:var(--cream-3);color:var(--teal-3);}
    .profil-tag-sm{font-family:var(--font-mono);font-size:10px;padding:5px 10px;border-radius:20px;border:1.5px solid var(--cream-3);color:var(--teal-2);}
    .profil-score-big{text-align:right;}
    .profil-score-num{font-family:var(--font-display);font-weight:900;font-size:48px;color:var(--ink);line-height:1;}
    .profil-score-lbl{font-family:var(--font-mono);font-size:10px;color:var(--teal-3);letter-spacing:.1em;text-transform:uppercase;margin-top:4px;}
    .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:1.5px solid var(--ink);}
    .section-head h3{font-family:var(--font-display);font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:-.01em;}
    .section-head .eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-deep);}
    .scores-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px;}
    .score-card{background:var(--cream-2);border:1.5px solid var(--cream-3);border-radius:8px;padding:16px 18px;}
    .score-card-dim{font-family:var(--font-mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--teal-3);margin-bottom:6px;}
    .score-card-val{font-family:var(--font-display);font-weight:900;font-size:28px;color:var(--ink);line-height:1;margin-bottom:6px;}
    .score-card-val small{font-size:13px;color:var(--teal-3);font-weight:400;}
    .score-bar-bg{width:100%;height:5px;background:var(--cream-3);border-radius:3px;overflow:hidden;margin-bottom:8px;}
    .score-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold));border-radius:3px;}
    .score-card-justif{font-size:12px;color:var(--teal-2);line-height:1.45;}
    .contacts-list{display:flex;flex-direction:column;gap:12px;}
    .contact-card{background:var(--cream-2);border:1.5px solid var(--cream-3);border-radius:8px;padding:16px 20px;display:flex;align-items:center;gap:16px;}
    .contact-card.new-card{border-color:var(--gold);background:rgba(201,168,106,.06);}
    .contact-avatar{width:44px;height:44px;border-radius:50%;background:var(--cream-3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .contact-info{flex:1;min-width:0;}
    .contact-company{font-family:var(--font-display);font-weight:900;font-size:14px;text-transform:uppercase;letter-spacing:-.01em;}
    .contact-msg{font-size:13px;color:var(--teal-2);margin-top:3px;line-height:1.4;}
    .contact-date{font-family:var(--font-mono);font-size:10px;color:var(--teal-3);margin-top:4px;}
    .contact-status{flex-shrink:0;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:20px;}
    .contact-status.pending{background:rgba(201,168,106,.15);color:var(--gold-deep);}
    .contact-status.accepted{background:rgba(76,175,80,.12);color:#2e7d32;}
    .contact-actions{display:flex;gap:8px;flex-shrink:0;}
    .btn-ca{padding:7px 14px;border-radius:4px;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;border:1.5px solid;}
    .btn-ca.accept{background:var(--gold-deep);color:var(--cream);border-color:var(--gold-deep);}
    .btn-ca.decline{background:none;color:var(--teal-3);border-color:var(--cream-3);}
    .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px;}
    .edit-card{background:var(--cream-2);border:1.5px solid var(--cream-3);border-radius:8px;padding:24px;}
    .edit-card-title{font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:16px;}
    .edit-form{display:flex;flex-direction:column;gap:14px;}
    .edit-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-3);display:block;margin-bottom:5px;}
    .edit-input{width:100%;padding:10px 14px;border:1.5px solid var(--cream-3);border-radius:4px;background:var(--cream);font-family:var(--font-sans);font-size:14px;color:var(--ink);outline:none;transition:border-color .2s;}
    .edit-input:focus{border-color:var(--gold-deep);}
    .edit-select{width:100%;padding:10px 14px;border:1.5px solid var(--cream-3);border-radius:4px;background:var(--cream);font-family:var(--font-mono);font-size:12px;color:var(--ink);outline:none;cursor:pointer;}
    .edit-range{width:100%;accent-color:var(--gold-deep);margin-top:4px;}
    .range-labels{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:9px;color:var(--teal-3);letter-spacing:.08em;text-transform:uppercase;margin-top:4px;}
    .profil-link-box{background:var(--ink);color:var(--cream);border-radius:8px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:32px;}
    .profil-link-url{font-family:var(--font-mono);font-size:13px;color:var(--gold);letter-spacing:.04em;}
    .btn-copy-link{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:9px 16px;border:1.5px solid rgba(255,248,231,.3);border-radius:4px;background:none;color:var(--cream);cursor:pointer;transition:all .2s;}
    .btn-copy-link:hover{border-color:var(--gold);color:var(--gold);}
    .btn-save{padding:13px 28px;background:var(--gold-deep);color:var(--cream);border:none;border-radius:4px;cursor:pointer;font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;transition:background .2s;}
    .btn-save:hover{background:var(--ink);}
    .btn-save:disabled{opacity:.5;cursor:not-allowed;}
    .no-cert-box{text-align:center;padding:60px 40px;border:2px dashed var(--cream-3);border-radius:8px;margin-bottom:32px;}
    .no-cert-box h3{font-family:var(--font-display);font-size:28px;font-weight:900;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:12px;}
    .no-cert-box p{font-size:15px;color:var(--teal-2);max-width:480px;margin:0 auto 24px;line-height:1.6;}
    .empty-state{text-align:center;padding:60px 40px;font-family:var(--font-mono);font-size:12px;color:var(--teal-3);letter-spacing:.08em;text-transform:uppercase;}
    .empty-state .big{font-size:48px;margin-bottom:12px;opacity:.25;display:block;}
    .loading-state{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;font-family:var(--font-mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-3);}
    .spinner{width:20px;height:20px;border-radius:50%;border:2px solid var(--cream-3);border-top-color:var(--gold-deep);animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--ink);color:var(--cream);padding:14px 20px;border-radius:6px;font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;border-left:3px solid var(--gold);transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.22,1,.36,1);pointer-events:none;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.success{border-left-color:#4caf50;}
    .toast.error{border-left-color:var(--rust);}
    @media(max-width:900px){.candidate-bar{padding:0 20px;}.tab-panel{padding:24px 20px;}.edit-grid,.scores-grid{grid-template-columns:1fr;}.profil-header{grid-template-columns:auto 1fr;}.profil-score-big{display:none;}.bar-tabs{display:none;}}
  </style>
</head>
<body class="page-enter">

<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <div class="auth-header">
      <a href="index.html" class="auth-logo"><span class="dot"></span>SalesUncut</a>
      <span class="auth-badge">Espace Candidat</span>
    </div>
    <div class="auth-body">
      <div class="auth-form">
        <div class="form-group"><label class="form-label">Email</label><input type="email" id="loginEmail" class="form-input" placeholder="vous@email.com"/></div>
        <div class="form-group"><label class="form-label">Mot de passe</label><input type="password" id="loginPassword" class="form-input" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"/></div>
        <div class="auth-error" id="loginError"></div>
        <button class="auth-submit" id="loginBtn" onclick="handleLogin()">Se connecter &rarr;</button>
      </div>
      <div class="auth-switch" style="margin-top:16px">Pas encore de compte ? <a href="/auth.html">Créer un compte</a></div>
    </div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="candidate-bar">
    <div class="candidate-bar-left">
      <a href="index.html" class="candidate-bar-logo"><span class="dot"></span>SalesUncut</a>
      <div class="bar-tabs">
        <div class="bar-tab active" onclick="switchTab('profil',this)">Mon profil</div>
        <div class="bar-tab" onclick="switchTab('contacts',this)">Demandes de contact <span id="newContactsCount" style="margin-left:6px;background:var(--rust);color:var(--cream);padding:2px 7px;border-radius:10px;font-size:9px;display:none;"></span></div>
        <div class="bar-tab" onclick="switchTab('edit',this)">Modifier mon profil</div>
      </div>
    </div>
    <div class="candidate-bar-right">
      <span class="candidate-name-display" id="candidateNameDisplay"></span>
      <button class="btn-logout" onclick="handleLogout()">Déconnexion</button>
    </div>
  </div>
  <div class="tab-panel active" id="panelProfil"><div id="profilContent"><div class="loading-state"><div class="spinner"></div> Chargement&hellip;</div></div></div>
  <div class="tab-panel" id="panelContacts">
    <div class="section-head" style="margin-bottom:24px"><h3>Demandes de contact</h3><span class="eyebrow">Recruteurs intéressés par ton profil</span></div>
    <div id="contactsList"><div class="loading-state"><div class="spinner"></div> Chargement&hellip;</div></div>
  </div>
  <div class="tab-panel" id="panelEdit">
    <div class="section-head" style="margin-bottom:24px"><h3>Modifier mon profil</h3><span class="eyebrow">Données déclaratives — les scores sont fixes</span></div>
    <div id="editContent"><div class="loading-state"><div class="spinner"></div> Chargement&hellip;</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const sb = window.supabase.createClient('https://svtyzkypmzmtcqunzfyy.supabase.co','sb_publishable_EV-3DNccOU1oZ8TVQMQuGA_hikbGMfB');
let currentUser=null, candidateData=null;

async function handleLogin(){
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('loginError');
  btn.disabled=true; btn.textContent='Connexion\u2026'; err.classList.remove('visible');
  const{error}=await sb.auth.signInWithPassword({
    email:document.getElementById('loginEmail').value,
    password:document.getElementById('loginPassword').value
  });
  if(error){err.textContent='Email ou mot de passe incorrect.';err.classList.add('visible');btn.disabled=false;btn.textContent='Se connecter \u2192';}
}

async function handleLogout(){await sb.auth.signOut();showAuth();}
function showAuth(){document.getElementById('authOverlay').classList.remove('hidden');document.getElementById('dashboard').classList.remove('visible');}
function showDashboard(){document.getElementById('authOverlay').classList.add('hidden');document.getElementById('dashboard').classList.add('visible');}

sb.auth.onAuthStateChange(async(event,session)=>{
  if(session){currentUser=session.user;showDashboard();await loadAll();}
  else{currentUser=null;showAuth();}
});

async function loadAll(){
  await loadCandidateData();
  await loadContacts();
}

async function loadCandidateData(){
  const{data}=await sb.from('candidates').select('*').eq('user_id',currentUser.id).maybeSingle();
  candidateData=data||null;
  const name=data?(`${data.prenom||''} ${data.nom||''}`.trim()||data.email):currentUser.email;
  document.getElementById('candidateNameDisplay').textContent=name;
  renderProfil();
  renderEdit();
}

function renderProfil(){
  const container=document.getElementById('profilContent');
  if(!candidateData||!candidateData.score_global){
    container.innerHTML='<div class="no-cert-box"><div style="font-size:56px;margin-bottom:16px">\uD83C\uDFAF</div><h3>Aucune certification trouv\u00e9e</h3><p>Tu n\u2019as pas encore de simulation li\u00e9e \u00e0 ce compte. Passe ton test pour voir tes r\u00e9sultats ici.</p></div>';
    return;
  }
  const c=candidateData, niveau=c.niveau_certifie||'NC', score=c.score_global||0;
  const profileUrl=window.location.origin+'/profil.html?id='+c.simulation_id;
  const dims=[
    {lbl:'Accroche',     val:c.score_accroche,     max:16,justif:c.justif_accroche},
    {lbl:'D\u00e9couverte',   val:c.score_decouverte,   max:16,justif:c.justif_decouverte},
    {lbl:'Cr\u00e9er besoin', val:c.score_creer_besoin, max:20,justif:c.justif_creer_besoin},
    {lbl:'Objections',   val:c.score_objections,   max:16,justif:c.justif_objections},
    {lbl:'Valeur',       val:c.score_valeur,       max:16,justif:c.justif_valeur},
    {lbl:'Closing',      val:c.score_closing,      max:16,justif:c.justif_closing}
  ].filter(function(d){return d.val!=null;});

  var html='<div class="profil-header">';
  html+='<div class="profil-avatar">'+(c.photo_url?'<img src="'+c.photo_url+'" alt="photo"/>':'<div class="profil-avatar-ph">\uD83D\uDC64</div>')+'</div>';
  html+='<div class="profil-identity"><h2>'+(c.prenom||'')+' '+(c.nom||'')+'</h2>';
  html+='<div class="meta">'+(c.role_type||'\u2014')+' \u00b7 '+(c.famille||'\u2014')+'</div>';
  html+='<div class="profil-badge-row"><span class="niveau-badge '+niveau+'">'+niveau+'</span>';
  if(c.date_certification){html+='<span class="profil-tag-sm">Certifi\u00e9 le '+new Date(c.date_certification).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})+'</span>';}
  html+='</div></div>';
  html+='<div class="profil-score-big"><div class="profil-score-num">'+score+'<span style="font-size:20px;color:var(--teal-3)">/100</span></div><div class="profil-score-lbl">Score global</div></div></div>';
  html+='<div class="profil-link-box"><div><div style="font-family:var(--font-mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,248,231,.4);margin-bottom:4px">Ton profil public</div><div class="profil-link-url">'+profileUrl+'</div></div>';
  html+='<button class="btn-copy-link" onclick="copyLink(\''+profileUrl+'\')">Copier</button></div>';
  if(dims.length){
    html+='<div class="section-head"><h3>Tes scores par dimension</h3><span class="eyebrow">Bar\u00e8me /100</span></div><div class="scores-grid">';
    dims.forEach(function(d){
      html+='<div class="score-card"><div class="score-card-dim">'+d.lbl+'</div>';
      html+='<div class="score-card-val">'+d.val+'<small>/'+d.max+'</small></div>';
      html+='<div class="score-bar-bg"><div class="score-bar-fill" style="width:'+Math.round(d.val/d.max*100)+'%"></div></div>';
      if(d.justif){html+='<div class="score-card-justif">'+d.justif+'</div>';}
      html+='</div>';
    });
    html+='</div>';
  }
  if(c.points_forts&&c.points_forts.length){
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px">';
    html+='<div style="background:var(--cream-2);border:1.5px solid var(--gold);border-radius:8px;padding:20px"><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:12px">\u25b2 Points forts</div>';
    c.points_forts.forEach(function(p){html+='<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--cream-3);font-size:14px"><span style="color:var(--gold-deep)">\u2191</span>'+p+'</div>';});
    html+='</div><div style="background:var(--ink);border-radius:8px;padding:20px"><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:12px">\u25bc Axes de progression</div>';
    (c.axes_developpement||[]).forEach(function(a){html+='<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,248,231,.1);font-size:14px;color:rgba(255,248,231,.85)"><span style="color:var(--gold)">\u2192</span>'+a+'</div>';});
    html+='</div></div>';
  }
  container.innerHTML=html;
}

async function loadContacts(){
  if(!candidateData){document.getElementById('contactsList').innerHTML='<div class="empty-state"><span class="big">\uD83D\uDCED</span>Aucune demande pour l\u2019instant.</div>';return;}
  var res=await sb.from('contact_requests').select('*,recruiter:recruiter_id(company_name,prenom,nom,email)').eq('candidate_id',candidateData.id).order('created_at',{ascending:false});
  const contacts=res.data||[];
  const newCount=contacts.filter(function(r){return r.status==='pending';}).length;
  const badge=document.getElementById('newContactsCount');
  badge.textContent=newCount;badge.style.display=newCount>0?'inline':'none';
  if(!contacts.length){document.getElementById('contactsList').innerHTML='<div class="empty-state"><span class="big">\uD83D\uDCED</span>Aucune demande de contact pour l\u2019instant.</div>';return;}
  var html='<div class="contacts-list">';
  contacts.forEach(function(c){
    html+='<div class="contact-card '+(c.status==='pending'?'new-card':'')+'">';
    html+='<div class="contact-avatar">\uD83C\uDFE2</div>';
    html+='<div class="contact-info"><div class="contact-company">'+(c.recruiter&&c.recruiter.company_name?c.recruiter.company_name:'Recruteur')+'</div>';
    if(c.message){html+='<div class="contact-msg">'+c.message+'</div>';}
    html+='<div class="contact-date">'+new Date(c.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})+'</div></div>';
    html+='<span class="contact-status '+c.status+'">'+(c.status==='pending'?'Nouveau':c.status==='accepted'?'Accept\u00e9':'\u2014')+'</span>';
    if(c.status==='pending'){html+='<div class="contact-actions"><button class="btn-ca accept" onclick="respondContact(\''+c.id+'\',\'accepted\')">Accepter</button><button class="btn-ca decline" onclick="respondContact(\''+c.id+'\',\'declined\')">Refuser</button></div>';}
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('contactsList').innerHTML=html;
  contacts.filter(function(c){return c.status==='pending';}).forEach(async function(c){await sb.from('contact_requests').update({status:'seen'}).eq('id',c.id);});
}

async function respondContact(id,status){
  await sb.from('contact_requests').update({status:status}).eq('id',id);
  showToast(status==='accepted'?'Demande accept\u00e9e \u2713':'Demande refus\u00e9e','success');
  await loadContacts();
}

function renderEdit(){
  const c=candidateData||{};
  const roles=['SDR','BDR','AE','AM','KAM','BD'];
  const avails=['Imm\u00e9diat','1 mois','2 mois','3 mois','\u00c0 l\u2019\u00e9coute'];
  const remotes=['Full remote','Hybride','Pr\u00e9sentiel'];
  var html='<div class="edit-grid">';
  html+='<div class="edit-card"><div class="edit-card-title">Identit\u00e9</div><div class="edit-form">';
  html+='<div><label class="edit-label">Pr\u00e9nom</label><input class="edit-input" id="editPrenom" value="'+(c.prenom||'')+'"/></div>';
  html+='<div><label class="edit-label">Nom</label><input class="edit-input" id="editNom" value="'+(c.nom||'')+'"/></div>';
  html+='<div><label class="edit-label">Localisation</label><input class="edit-input" id="editLocation" value="'+(c.location||'')+'" placeholder="Paris, Lyon\u2026"/></div>';
  html+='<div><label class="edit-label">LinkedIn URL</label><input class="edit-input" id="editLinkedin" value="'+(c.linkedin_url||'')+'" placeholder="https://linkedin.com/in/\u2026"/></div>';
  html+='<div><label class="edit-label">Profil public</label><select class="edit-select" id="editPublic"><option value="true" '+(c.is_public!==false?'selected':'')+'>Visible dans le pool</option><option value="false" '+(c.is_public===false?'selected':'')+'>Masqu\u00e9</option></select></div>';
  html+='</div></div>';
  html+='<div class="edit-card"><div class="edit-card-title">Exp\u00e9rience</div><div class="edit-form">';
  html+='<div><label class="edit-label">R\u00f4le</label><select class="edit-select" id="editRole">'+roles.map(function(r){return '<option '+(c.role_type===r?'selected':'')+'>'+r+'</option>';}).join('')+'</select></div>';
  html+='<div><label class="edit-label">Ann\u00e9es d\u2019exp.</label><input type="number" class="edit-input" id="editExp" value="'+(c.experience_years||0)+'" min="0" max="30"/></div>';
  html+='<div><label class="edit-label">Taille deal</label><input class="edit-input" id="editDeal" value="'+(c.deal_size||'')+'" placeholder="10-50k\u20ac"/></div>';
  html+='<div><label class="edit-label">Cycle de vente</label><input class="edit-input" id="editCycle" value="'+(c.sales_cycle||'')+'" placeholder="3-6 mois"/></div>';
  html+='<div><label class="edit-label">Atteinte quota (%)</label><input type="number" class="edit-input" id="editQuota" value="'+(c.quota_attainment||0)+'" min="0" max="300"/></div>';
  html+='</div></div>';
  html+='<div class="edit-card"><div class="edit-card-title">Package souhait\u00e9</div><div class="edit-form">';
  html+='<div><label class="edit-label">Fixe (\u20ac)</label><input type="number" class="edit-input" id="editFixed" value="'+(c.ote_fixed||0)+'"/></div>';
  html+='<div><label class="edit-label">Variable (\u20ac)</label><input type="number" class="edit-input" id="editVariable" value="'+(c.ote_variable||0)+'"/></div>';
  html+='<div><label class="edit-label">Disponibilit\u00e9</label><select class="edit-select" id="editAvail">'+avails.map(function(a){return '<option '+(c.availability===a?'selected':'')+'>'+a+'</option>';}).join('')+'</select></div>';
  html+='<div><label class="edit-label">Remote</label><select class="edit-select" id="editRemote">'+remotes.map(function(r){return '<option '+(c.remote===r?'selected':'')+'>'+r+'</option>';}).join('')+'</select></div>';
  html+='</div></div>';
  var hunting=c.hunting_pct||50;
  html+='<div class="edit-card"><div class="edit-card-title">Profil terrain</div><div class="edit-form">';
  html+='<div><label class="edit-label">Hunting <span id="huntingVal">'+hunting+'</span>%</label>';
  html+='<input type="range" class="edit-range" id="editHunting" value="'+hunting+'" min="0" max="100" oninput="document.getElementById(\'huntingVal\').textContent=this.value;document.getElementById(\'farmingVal\').textContent=100-this.value"/>';
  html+='<div class="range-labels"><span>Farming</span><span>Hunting</span></div></div>';
  html+='<div><label class="edit-label">Farming <span id="farmingVal">'+(100-hunting)+'</span>%</label></div>';
  html+='</div></div></div>';
  html+='<button class="btn-save" id="saveBtn" onclick="saveProfile()">Sauvegarder \u2192</button>';
  document.getElementById('editContent').innerHTML=html;
}

async function saveProfile(){
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='Sauvegarde\u2026';
  const hunting=parseInt(document.getElementById('editHunting').value);
  const fixed=parseInt(document.getElementById('editFixed').value)||0;
  const variable=parseInt(document.getElementById('editVariable').value)||0;
  const updates={
    prenom:document.getElementById('editPrenom').value,
    nom:document.getElementById('editNom').value,
    location:document.getElementById('editLocation').value,
    linkedin_url:document.getElementById('editLinkedin').value,
    is_public:document.getElementById('editPublic').value==='true',
    role_type:document.getElementById('editRole').value,
    experience_years:parseInt(document.getElementById('editExp').value)||0,
    deal_size:document.getElementById('editDeal').value,
    sales_cycle:document.getElementById('editCycle').value,
    quota_attainment:parseInt(document.getElementById('editQuota').value)||0,
    ote_fixed:fixed,ote_variable:variable,ote_total:fixed+variable,
    availability:document.getElementById('editAvail').value,
    remote:document.getElementById('editRemote').value,
    hunting_pct:hunting,farming_pct:100-hunting,
    updated_at:new Date().toISOString()
  };
  if(candidateData){
    await sb.from('candidates').update(updates).eq('id',candidateData.id);
  } else {
    await sb.from('candidates').insert(Object.assign({},updates,{user_id:currentUser.id,email:currentUser.email,is_public:false}));
  }
  showToast('Profil mis \u00e0 jour \u2713','success');
  btn.disabled=false;btn.textContent='Sauvegarder \u2192';
  await loadCandidateData();
}

function copyLink(url){
  navigator.clipboard.writeText(url).then(function(){showToast('Lien copi\u00e9 \u2713','success');}).catch(function(){
    var el=document.createElement('textarea');el.value=url;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);showToast('Lien copi\u00e9 \u2713','success');
  });
}
function switchTab(tab,el){
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.bar-tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('panel'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  el.classList.add('active');
}
function showToast(msg,type){
  var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'')+' show';
  setTimeout(function(){t.classList.remove('show');},3000);
}
</script>
