<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SalesUncut — Mon espace candidat</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-overlay{position:fixed;inset:0;z-index:200;background:var(--ink);display:flex;align-items:center;justify-content:center;padding:24px;}
    .auth-overlay.hidden{display:none;}
    .auth-box{width:100%;max-width:460px;background:var(--cream);border:1.5px solid var(--ink);border-radius:8px;overflow:hidden;}
    .auth-header{background:var(--ink);padding:28px 36px;display:flex;align-items:center;justify-content:space-between;}
    .auth-logo{font-family:var(--font-display);font-weight:900;font-size:18px;color:var(--cream);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:8px;text-decoration:none;}
    .auth-logo .dot{width:8px;height:8px;background:var(--gold);border-radius:50%;}
    .auth-badge{font-family:var(--font-mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);padding:4px 10px;border-radius:20px;}
    .auth-body{padding:36px;}
    .auth-form{display:flex;flex-direction:column;gap:16px;}
    .form-group{display:flex;flex-direction:column;gap:6px;}
    .form-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal-3);}
    .form-input{padding:12px 16px;border:1.5px solid var(--cream-3);border-radius:4px;background:var(--cream);font-family:var(--font-sans);font-size:15px;color:var(--ink);transition:border-color .2s;outline:none;}
    .form-input:focus{border-color:var(--gold-deep);}
    .form-input::placeholder{color:var(--teal-3);}
    .auth-submit{margin-top:8px;padding:15px;background:var(--gold-deep);color:var(--cream);border:none;border-radius:4px;cursor:pointer;font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;transition:background .2s;}
    .auth-submit:hover{background:var(--ink);}
    .auth-submit:disabled{opacity:.5;cursor:not-allowed;}
    .auth-error{padding:12px 16px;background:rgba(179,78,42,.1);border:1px solid var(--rust);border-radius:4px;font-size:13px;color:var(--rust);display:none;}
    .auth-error.visible{display:block;}
    .auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--teal-3);}
    .auth-switch a{color:var(--gold-deep);cursor:pointer;text-decoration:underline;}
    .dashboard{display:none;}
    .dashboard.visible{display:block;}
    .candidate-bar{background:var(--ink);color:var(--cream);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:52px;border-bottom:1px solid rgba(255,248,231,.1);}
    .candidate-bar-left{display:flex;align-items:center;gap:32px;}
    .candidate-bar-logo{font-family:var(--font-display);font-weight:900;font-size:16px;color:var(--cream);text-transform:uppercase;letter-spacing:.05em;text-decoration:none;display:flex;align-items:center;gap:6px;}
    .candidate-bar-logo .dot{width:6px;height:6px;background:var(--gold);border-radius:50%;}
    .bar-tabs{display:flex;}
    .bar-tab{padding:0 20px;height:52px;display:flex;align-items:center;font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;color:rgba(255,248,231,.5);border-bottom:2px solid transparent;transition:all .2s;}
    .bar-tab.active{color:var(--cream);border-bottom-color:var(--gold);}
    .bar-tab:hover{color:var(--cream);}
    .candidate-bar-right{display:flex;align-items:center;gap:16px;}
    .candidate-name-display{font-family:var(--font-mono);font-size:11px;color:rgba(255,248,231,.6);letter-spacing:.08em;}
    .btn-logout{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;border:1px solid rgba(255,248,231,.2);border-radius:3px;background:none;color:rgba(255,248,231,.6);cursor:pointer;transition:all .2s;}
    .btn-logout:hover{border-color:var(--rust);color:var(--rust);}
    .tab-panel{display:none;padding:40px;}
    .tab-panel.active{display:block;}
    .pool-banner{display:flex;align-items:center;gap:16px;padding:16px 20px;border-radius:8px;margin-bottom:28px;font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;}
    .pool-banner.locked{background:rgba(26,34,34,.05);border:1.5px dashed var(--cream-3);color:var(--teal-3);}
    .pool-banner.live{background:rgba(76,175,80,.08);border:1.5px solid #4caf50;color:#2e7d32;}
    .pool-banner .pool-icon{font-size:20px;flex-shrink:0;}
    .pool-banner .pool-text strong{display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;}
    /* CTA simulation */
    .simu-cta{background:var(--ink);border-radius:8px;padding:28px 32px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;gap:24px;}
    .simu-cta-text{color:var(--cream);}
    .simu-cta-title{font-family:var(--font-display);font-weight:900;font-size:20px;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:6px;}
    .simu-cta-sub{font-family:var(--font-mono);font-size:11px;color:rgba(255,248,231,.5);letter-spacing:.06em;line-height:1.5;}
    .simu-cta-btn{flex-shrink:0;padding:14px 28px;background:var(--gold-deep);color:var(--cream);border:none;border-radius:4px;cursor:pointer;font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:background .2s;white-space:nowrap;}
    .simu-cta-btn:hover{background:var(--gold-glow);color:var(--ink);}
    .profil-preview-wrap{display:grid;grid-template-columns:280px 1fr;gap:32px;align-items:start;margin-bottom:36px;}
    .profil-card-preview{background:var(--cream-2);border:1.5px solid var(--ink);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-card);}
    .pcp-portrait{width:100%;aspect-ratio:1;background:var(--cream-3);position:relative;overflow:hidden;}
    .pcp-portrait img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
    .pcp-portrait .pcp-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;opacity:.2;}
    .pcp-level{position:absolute;bottom:8px;right:8px;font-family:var(--font-display);font-weight:900;font-size:10px;letter-spacing:.08em;padding:4px 10px;border-radius:3px;}
    .pcp-level.GOLD{background:var(--golden);color:var(--ink);}
    .pcp-level.SILVER{background:var(--silver);color:var(--ink);}
    .pcp-level.BRONZE{background:var(--bronze);color:var(--cream);}
    .pcp-level.NC{background:var(--cream-3);color:var(--teal-3);}
    .pcp-family{position:absolute;top:8px;left:8px;background:var(--ink);color:var(--gold);font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;padding:3px 7px;border-radius:3px;}
    .pcp-body{padding:14px;}
    .pcp-name{font-family:var(--font-display);font-weight:900;font-size:16px;text-transform:uppercase;letter-spacing:-.01em;line-height:1.1;margin-bottom:2px;}
    .pcp-meta{font-family:var(--font-mono);font-size:9px;color:var(--teal-3);letter-spacing:.08em;margin-bottom:10px;}
    .pcp-score{font-family:var(--font-display);font-weight:900;font-size:32px;color:var(--ink);line-height:1;margin-bottom:10px;}
    .pcp-score small{font-size:13px;color:var(--teal-3);font-weight:400;}
    .pcp-score-pending{font-family:var(--font-mono);font-size:11px;color:var(--teal-3);letter-spacing:.08em;padding:8px 0;border-top:1px solid var(--cream-3);margin-top:4px;}
    .pcp-dims{display:flex;flex-direction:column;gap:3px;}
    .dim-mini{display:flex;align-items:center;gap:6px;}
    .dim-mini-lbl{font-family:var(--font-mono);font-size:8px;color:var(--teal-3);width:56px;flex-shrink:0;text-transform:uppercase;letter-spacing:.06em;}
    .dim-mini-bar{flex:1;height:3px;background:var(--cream-3);border-radius:2px;overflow:hidden;}
    .dim-mini-bar i{display:block;height:100%;background:var(--gold-deep);border-radius:2px;}
    .dim-mini-val{font-family:var(--font-mono);font-size:8px;color:var(--ink);width:20px;text-align:right;}
    .dim-mini-lock{font-size:9px;opacity:.35;width:20px;text-align:right;}
    .pcp-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--cream-3);padding-top:10px;margin-top:10px;}
    .pcp-role{font-family:var(--font-mono);font-size:9px;color:var(--teal-3);letter-spacing:.06em;text-transform:uppercase;}
    .profil-info-panel{display:flex;flex-direction:column;gap:16px;}
    .info-block{background:var(--cream-2);border:1.5px solid var(--cream-3);border-radius:8px;padding:20px 24px;}
    .info-block-title{font-family:var(--font-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:14px;}
    .info-rows{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;}
    .info-row{display:flex;flex-direction:column;gap:3px;}
    .info-lbl{font-family:var(--font-mono);font-size:9px;color:var(--teal-3);letter-spacing:.1em;text-transform:uppercase;}
    .info-val{font-size:14px;color:var(--ink);font-weight:500;}
    .info-val.empty{color:var(--cream-3);font-style:italic;font-size:12px;}
    .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:1.5px solid var(--ink);}
    .section-head h3{font-family:var(--font-display);font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:-.01em;}
    .section-head .eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-deep);}
    .scores-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px;}
    .score-card{background:var(--cream-2);border:1.5px solid var(--cream-3);border-radius:8px;padding:16px 18px;}
    .score-card.locked{opacity:.7;}
    .score-card-dim{font-family:var(--font-mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--teal-3);margin-bottom:6px;}
    .score-card-val{font-family:var(--font-display);font-weight:900;font-size:28px;color:var(--ink);line-height:1;margin-bottom:6px;}
    .score-card-val small{font-size:13px;color:var(--teal-3);font-weight:400;}
    .score-card-val.pending{font-size:20px;color:var(--cream-3);}
    .score-bar-bg{width:100%;height:5px;background:var(--cream-3);border-radius:3px;overflow:hidden;margin-bottom:8px;}
    .score-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold));border-radius:3px;}
    .score-card-justif{font-size:12px;color:var(--teal-2);line-height:1.45;}
    .score-card-pending-msg{font-family:var(--font-mono);font-size:10px;color:var(--teal-3);letter-spacing:.06em;line-height:1.4;}
    .profil-link-box{background:var(--ink);color:var(--cream);border-radius:8px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:28px;}
    .profil-link-url{font-family:var(--font-mono);font-size:13px;color:var(--gold);letter-spacing:.04em;word-break:break-all;}
    .btn-copy-link{flex-shrink:0;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:9px 16px;border:1.5px solid rgba(255,248,231,.3);border-radius:4px;background:none;color:var(--cream);cursor:pointer;transition:all .2s;}
    .btn-copy-link:hover{border-color:var(--gold);color:var(--gold);}
    .strengths-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px;}
    .strength-box{border-radius:8px;padding:20px;}
    .strength-box.plus{background:var(--cream-2);border:1.5px solid var(--gold);}
    .strength-box.minus{background:var(--ink);}
    .strength-title{font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;}
    .strength-box.plus .strength-title{color:var(--gold-deep);}
    .strength-box.minus .strength-title{color:var(--gold);}
    .strength-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid;font-size:14px;line-height:1.4;}
    .strength-box.plus .strength-item{border-color:var(--cream-3);color:var(--ink);}
    .strength-box.minus .strength-item{border-color:rgba(255,248,231,.1);color:rgba(255,248,231,.85);}
    .strength-item:last-child{border-bottom:none;}
    .contacts-list{display:flex;flex-direction:column;gap:12px;}
    .contact-card{background:var(--cream-2);border:1.5px solid var(--cream-3);border-radius:8px;padding:16px 20px;display:flex;align-items:center;gap:16px;}
    .contact-card.new-card{border-color:var(--gold);background:rgba(201,168,106,.06);}
    .contact-avatar{width:44px;height:44px;border-radius:50%;background:var(--cream-3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .contact-info{flex:1;min-width:0;}
    .contact-company{font-family:var(--font-display);font-weight:900;font-size:14px;text-transform:uppercase;letter-spacing:-.01em;}
    .contact-msg{font-size:13px;color:var(--teal-2);margin-top:3px;line-height:1.4;}
    .contact-date{font-family:var(--font-mono);font-size:10px;color:var(--teal-3);margin-top:4px;}
    .contact-status{flex-shrink:0;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:20px;}
    .contact-status.pending{background:rgba(201,168,106,.15);color:var(--gold-deep);}
    .contact-status.accepted{background:rgba(76,175,80,.12);color:#2e7d32;}
    .contact-actions{display:flex;gap:8px;flex-shrink:0;}
    .btn-ca{padding:7px 14px;border-radius:4px;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;border:1.5px solid;}
    .btn-ca.accept{background:var(--gold-deep);color:var(--cream);border-color:var(--gold-deep);}
    .btn-ca.decline{background:none;color:var(--teal-3);border-color:var(--cream-3);}
    .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px;}
    .edit-card{background:var(--cream-2);border:1.5px solid var(--cream-3);border-radius:8px;padding:24px;}
    .edit-card-title{font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:16px;}
    .edit-form{display:flex;flex-direction:column;gap:14px;}
    .edit-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-3);display:block;margin-bottom:5px;}
    .edit-input{width:100%;padding:10px 14px;border:1.5px solid var(--cream-3);border-radius:4px;background:var(--cream);font-family:var(--font-sans);font-size:14px;color:var(--ink);outline:none;transition:border-color .2s;box-sizing:border-box;}
    .edit-input:focus{border-color:var(--gold-deep);}
    .edit-select{width:100%;padding:10px 14px;border:1.5px solid var(--cream-3);border-radius:4px;background:var(--cream);font-family:var(--font-mono);font-size:12px;color:var(--ink);outline:none;cursor:pointer;}
    .edit-select:disabled{opacity:.5;cursor:not-allowed;background:var(--cream-3);}
    .edit-range{width:100%;accent-color:var(--gold-deep);margin-top:4px;}
    .range-labels{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:9px;color:var(--teal-3);letter-spacing:.08em;text-transform:uppercase;margin-top:4px;}
    .photo-upload-wrap{display:flex;align-items:center;gap:16px;}
    .photo-preview{width:72px;height:72px;border-radius:50%;background:var(--cream-3);border:2px solid var(--cream-3);overflow:hidden;flex-shrink:0;}
    .photo-preview img{width:100%;height:100%;object-fit:cover;display:block;}
    .photo-preview .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;opacity:.3;}
    .photo-upload-right{display:flex;flex-direction:column;gap:8px;}
    .btn-photo-pick{padding:8px 16px;background:var(--ink);color:var(--cream);border:none;border-radius:4px;cursor:pointer;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;transition:background .2s;}
    .btn-photo-pick:hover{background:var(--gold-deep);}
    .photo-hint{font-family:var(--font-mono);font-size:9px;color:var(--teal-3);letter-spacing:.06em;}
    .photo-uploading{font-family:var(--font-mono);font-size:10px;color:var(--gold-deep);letter-spacing:.06em;display:none;}
    .btn-save{padding:13px 28px;background:var(--gold-deep);color:var(--cream);border:none;border-radius:4px;cursor:pointer;font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;transition:background .2s;}
    .btn-save:hover{background:var(--ink);}
    .btn-save:disabled{opacity:.5;cursor:not-allowed;}
    .disabled-note{font-family:var(--font-mono);font-size:10px;color:var(--rust);letter-spacing:.06em;margin-top:4px;}
    .empty-state{text-align:center;padding:60px 40px;font-family:var(--font-mono);font-size:12px;color:var(--teal-3);letter-spacing:.08em;text-transform:uppercase;}
    .empty-state .big{font-size:48px;margin-bottom:12px;opacity:.25;display:block;}
    .loading-state{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;font-family:var(--font-mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-3);}
    .spinner{width:20px;height:20px;border-radius:50%;border:2px solid var(--cream-3);border-top-color:var(--gold-deep);animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--ink);color:var(--cream);padding:14px 20px;border-radius:6px;font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;border-left:3px solid var(--gold);transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.22,1,.36,1);pointer-events:none;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.success{border-left-color:#4caf50;}
    .toast.error{border-left-color:var(--rust);}
    @media(max-width:960px){.profil-preview-wrap{grid-template-columns:1fr;}.profil-card-preview{max-width:280px;}.candidate-bar{padding:0 20px;}.tab-panel{padding:24px 20px;}.edit-grid,.scores-grid,.strengths-grid,.info-rows{grid-template-columns:1fr;}.bar-tabs{display:none;}.simu-cta{flex-direction:column;align-items:flex-start;gap:16px;}.simu-cta-btn{width:100%;justify-content:center;}}
  </style>
</head>
<body class="page-enter">

<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <div class="auth-header">
      <a href="index.html" class="auth-logo"><span class="dot"></span>SalesUncut</a>
      <span class="auth-badge">Espace Candidat</span>
    </div>
    <div class="auth-body">
      <div class="auth-form">
        <div class="form-group"><label class="form-label">Email</label><input type="email" id="loginEmail" class="form-input" placeholder="vous@email.com"/></div>
        <div class="form-group"><label class="form-label">Mot de passe</label><input type="password" id="loginPassword" class="form-input" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"/></div>
        <div class="auth-error" id="loginError"></div>
        <button class="auth-submit" id="loginBtn" onclick="handleLogin()">Se connecter &rarr;</button>
      </div>
      <div class="auth-switch" style="margin-top:16px">Pas encore de compte ? <a href="/onboarding.html">Cr&eacute;er un compte</a></div>
    </div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="candidate-bar">
    <div class="candidate-bar-left">
      <a href="index.html" class="candidate-bar-logo"><span class="dot"></span>SalesUncut</a>
      <div class="bar-tabs">
        <div class="bar-tab active" id="tabBtnProfil" onclick="switchTab('profil',this)">Mon profil</div>
        <div class="bar-tab" id="tabBtnContacts" onclick="switchTab('contacts',this)">Demandes de contact <span id="newContactsCount" style="margin-left:6px;background:var(--rust);color:var(--cream);padding:2px 7px;border-radius:10px;font-size:9px;display:none;"></span></div>
        <div class="bar-tab" id="tabBtnEdit" onclick="switchTab('edit',this)">Modifier mon profil</div>
      </div>
    </div>
    <div class="candidate-bar-right">
      <span class="candidate-name-display" id="candidateNameDisplay"></span>
      <button class="btn-logout" onclick="handleLogout()">D&eacute;connexion</button>
    </div>
  </div>
  <div class="tab-panel active" id="panelProfil"><div id="profilContent"><div class="loading-state"><div class="spinner"></div> Chargement&hellip;</div></div></div>
  <div class="tab-panel" id="panelContacts">
    <div class="section-head" style="margin-bottom:24px"><h3>Demandes de contact</h3><span class="eyebrow">Recruteurs int&eacute;ress&eacute;s par ton profil</span></div>
    <div id="contactsList"><div class="loading-state"><div class="spinner"></div> Chargement&hellip;</div></div>
  </div>
  <div class="tab-panel" id="panelEdit">
    <div class="section-head" style="margin-bottom:24px"><h3>Mon profil</h3><span class="eyebrow">Donn&eacute;es d&eacute;claratives &mdash; scores verrouill&eacute;s</span></div>

<script>

  if(c.ote_fixed||c.ote_variable||c.availability||c.remote){

    else{h+='<div class="score-card locked"><div class="score-card-dim">'+d.lbl+'</div><div class="score-card-val pending">\u2014\u00a0/\u00a0'+d.max+'</div><div class="score-bar-bg"></div><div class="score-card-pending-msg">Score disponible apr\u00e8s la simulation audio.</div></div>';}

  h+='</div>';

    h+='<div class="strengths-grid"><div class="strength-box plus"><div class="strength-title">\u25b2 Points forts</div>';

    (c.axes_developpement||[]).forEach(function(a){h+='<div class="strength-item"><span style="color:var(--gold)">\u2192</span>'+a+'</div>';});
    h+='</div></div>';

  document.getElementById('profilContent').innerHTML=h;

function ir(lbl,val){return '<div class="info-row"><span class="info-lbl">'+lbl+'</span><span class="info-val'+(val?'':' empty')+'">'+(val||'Non renseign\u00e9')+'</span></div>';}

  var c=candidateData||{},scored=!!(c.score_global);
  var roles=['SDR','BDR','AE','AM','KAM','BD'];

  else{h+='<select class="edit-select" id="editPublic" disabled><option>Simulation requise pour activer</option></select><div class="disabled-note">Passe la simulation pour appara\u00eetre dans le pool.</div>';}
  h+='</div></div></div>';
  h+='<div class="edit-card"><div class="edit-card-title">Exp\u00e9rience</div><div class="edit-form">';

/* \u2500\u2500 PHOTO UPLOAD */
async function handlePhotoChange(event){
  var file=event.target.files[0];
  if(!file)return;
  if(file.size>5*1024*1024){showToast('Photo trop lourde (max 5 Mo)','error');return;}
  var reader=new FileReader();
  reader.onload=function(e){document.getElementById('photoPreview').innerHTML='<img src="'+e.target.result+'" alt="photo"/>';};
  reader.readAsDataURL(file);
  document.getElementById('photoUploading').style.display='block';
  var ext=file.name.split('.').pop().toLowerCase();
  var path=currentUser.id+'/avatar.'+ext;
  var up=await sb.storage.from('candidate-photos').upload(path,file,{upsert:true,contentType:file.type});
  if(up.error){document.getElementById('photoUploading').style.display='none';showToast('Erreur upload : '+up.error.message,'error');return;}
  var publicUrl=sb.storage.from('candidate-photos').getPublicUrl(path).data.publicUrl+'?t='+Date.now();
  if(candidateData){
    await sb.from('candidates').update({photo_url:publicUrl}).eq('id',candidateData.id);
    candidateData.photo_url=publicUrl;
  }else{
    await sb.from('candidates').insert({user_id:currentUser.id,email:currentUser.email,photo_url:publicUrl,is_public:false});
    await loadCandidateData();
  }
  document.getElementById('photoUploading').style.display='none';
  showToast('Photo mise \u00e0 jour \u2713','success');
}

/* \u2500\u2500 SAVE */
async function saveProfile(){
  var btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='Sauvegarde\u2026';
  try{
    var hunting=parseInt(document.getElementById('editHunting').value);
    var fixed=parseInt(document.getElementById('editFixed').value)||0;
    var variable=parseInt(document.getElementById('editVariable').value)||0;
    var scored=!!(candidateData&&candidateData.score_global);
    var isPublic=scored?document.getElementById('editPublic').value==='true':false;
    var updates={
      prenom:document.getElementById('editPrenom').value||null,
      nom:document.getElementById('editNom').value||null,
      location:document.getElementById('editLocation').value||null,
      linkedin_url:document.getElementById('editLinkedin').value||null,
      is_public:isPublic,
      role_type:document.getElementById('editRole').value,
      experience_years:parseInt(document.getElementById('editExp').value)||0,
      deal_size:document.getElementById('editDeal').value||null,
      sales_cycle:document.getElementById('editCycle').value||null,
      quota_attainment:parseInt(document.getElementById('editQuota').value)||0,
      ote_fixed:fixed,ote_variable:variable,ote_total:fixed+variable,
      availability:document.getElementById('editAvail').value,
      remote:document.getElementById('editRemote').value,
      hunting_pct:hunting,farming_pct:100-hunting,
      updated_at:new Date().toISOString()
    };
    var r;
    if(candidateData){
      r=await sb.from('candidates').update(updates).eq('id',candidateData.id);
    }else{
      r=await sb.from('candidates').insert(Object.assign({},updates,{
        user_id:currentUser.id,
        email:currentUser.email,
        is_public:false
      }));
    }
    if(r.error){throw new Error(r.error.message+'  (code: '+r.error.code+')');}
    await loadCandidateData();
    switchTab('profil',document.getElementById('tabBtnProfil'));
    showToast('Profil mis \u00e0 jour \u2713','success');
  }catch(e){
    showToast('Erreur : '+e.message,'error');
  }finally{
    btn.disabled=false;btn.textContent='Sauvegarder &amp; voir mon profil \u2192';
  }
}

/* \u2500\u2500 CONTACTS */
async function loadContacts(){
  if(!candidateData){document.getElementById('contactsList').innerHTML='<div class="empty-state"><span class="big">\uD83D\uDCED</span>Aucune demande pour l\u2019instant.</div>';return;}
  var r=await sb.from('contact_requests').select('*,recruiter:recruiter_id(company_name,prenom,nom,email)').eq('candidate_id',candidateData.id).order('created_at',{ascending:false});
  var contacts=r.data||[];
  var nc=contacts.filter(function(x){return x.status==='pending';}).length;
  var badge=document.getElementById('newContactsCount');badge.textContent=nc;badge.style.display=nc>0?'inline':'none';
  if(!contacts.length){document.getElementById('contactsList').innerHTML='<div class="empty-state"><span class="big">\uD83D\uDCED</span>Aucune demande de contact pour l\u2019instant.</div>';return;}
  var h='<div class="contacts-list">';
  contacts.forEach(function(c){
    h+='<div class="contact-card '+(c.status==='pending'?'new-card':'')+'"><div class="contact-avatar">\uD83C\uDFE2</div>';
    h+='<div class="contact-info"><div class="contact-company">'+(c.recruiter&&c.recruiter.company_name?c.recruiter.company_name:'Recruteur')+'</div>';
    if(c.message)h+='<div class="contact-msg">'+c.message+'</div>';
    h+='<div class="contact-date">'+new Date(c.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})+'</div></div>';
    h+='<span class="contact-status '+c.status+'">'+(c.status==='pending'?'Nouveau':c.status==='accepted'?'Accept\u00e9':'\u2014')+'</span>';
    if(c.status==='pending')h+='<div class="contact-actions"><button class="btn-ca accept" onclick="respondContact(\''+c.id+'\'\,\'accepted\')">Accepter</button><button class="btn-ca decline" onclick="respondContact(\''+c.id+'\'\,\'declined\')">Refuser</button></div>';
    h+='</div>';
  });
  document.getElementById('contactsList').innerHTML=h+'</div>';
  contacts.filter(function(c){return c.status==='pending';}).forEach(async function(c){await sb.from('contact_requests').update({status:'seen'}).eq('id',c.id);});
}
async function respondContact(id,status){
  await sb.from('contact_requests').update({status:status}).eq('id',id);
  showToast(status==='accepted'?'Demande accept\u00e9e \u2713':'Demande refus\u00e9e','success');
  await loadContacts();
}

/* \u2500\u2500 UTILS */
function copyLink(url){navigator.clipboard.writeText(url).then(function(){showToast('Lien copi\u00e9 \u2713','success');}).catch(function(){var el=document.createElement('textarea');el.value=url;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);showToast('Lien copi\u00e9 \u2713','success');});}
function switchTab(tab,el){
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.bar-tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('panel'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  el.classList.add('active');
}
function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'')+' show';setTimeout(function(){t.classList.remove('show');},3000);}
</script>
